<div class="mx-auto max-w-4xl p-6 pt-24 pb-20">

  <div class="mb-12 text-left">
    <h1 class="text-4xl font-black tracking-tighter text-black">Создание теста</h1>
    <!--<p class="text-lg font-bold tracking-tight text-gray-400">Define your questions and set the rules.</p>-->
  </div>

  <div *ngIf="text_error"
       class="mb-8 p-4 rounded-2xl border border-red-100 bg-red-50 text-red-600 font-bold flex items-center gap-3">
    <span>⚠️</span> {{ text_error }}
  </div>

  <div class="bg-gray-50 rounded-[2rem] p-8 border border-gray-100 mb-8 space-y-6">
    <div class="space-y-2">
      <label class="text-sm font-black uppercase tracking-widest text-gray-400 px-1">Название</label>
      <input type="text"
             name="test-title"
             [(ngModel)]="test.title"
             [readonly]="is_editing_locked"
             placeholder="Введите название..."
             class="w-full p-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black transition shadow-sm" />
    </div>

    <div class="flex items-center gap-3 px-1">
      <input type="checkbox"
             [(ngModel)]="test.published"
             [disabled]="is_editing_locked"
             id="publish"
             class="h-5 w-5 rounded border-gray-300 text-black focus:ring-black" />
      <label for="publish" class="text-gray-700 font-bold tracking-tight">Опубликовать</label>
    </div>

    <div *ngIf="test.title != ''" class="pt-4 border-t border-gray-200 space-y-2">
      <label class="text-sm font-black uppercase tracking-widest text-gray-400 px-1">Описание</label>
      <textarea name="test-description"
                rows="2"
                [(ngModel)]="test.description"
                [readonly]="is_editing_locked"
                placeholder="О чем будет ваш тест?"
                class="w-full p-4 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black transition resize-none shadow-sm"></textarea>
    </div>
  </div>

  <div class="mb-12 px-2">
    <p class="text-sm font-black uppercase tracking-widest text-gray-400 mb-4">Модификации</p>
    <div class="flex flex-wrap gap-3">
      <label *ngFor="let t of types"
             class="cursor-pointer group">
        <input type="checkbox" class="hidden"
               [checked]="test.types.includes(t.name)"
               [disabled]="is_editing_locked"
               (change)="toggleType(t.name)" />
        <span class="px-5 py-2 rounded-full border-2 transition-all font-bold text-sm"
              [ngClass]="test.types.includes(t.name) ? 'bg-black border-black text-white' : 'bg-white border-gray-100 text-gray-400 group-hover:border-gray-300'">
          {{ t.description }}
        </span>
      </label>
    </div>
  </div>

  <div class="space-y-10"
       cdkDropList
       (cdkDropListDropped)="dropQuestion($event)">

    <div *ngFor="let question of test.questions; let i = index"
         cdkDrag
         class="bg-white border border-gray-100 rounded-[2.5rem] shadow-xl shadow-gray-100/50 p-8 relative group">

      <div cdkDragHandle class="absolute right-8 top-8 cursor-move text-gray-300 hover:text-black transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
        </svg>
      </div>

      <div class="mb-6">
        <span class="text-xs font-black text-white bg-black px-3 py-1 rounded-full uppercase tracking-tighter">Вопрос {{ i + 1 }}</span>
      </div>

      <div class="flex items-center gap-3 mb-6">
        <input type="checkbox"
               [(ngModel)]="question.isMultiple"
               [disabled]="is_editing_locked"
               (change)="onMultipleChange(question)"
               class="h-5 w-5 rounded border-gray-300 text-black focus:ring-black" />
        <span class="text-sm font-bold text-gray-600">Несколько вариантов ответа</span>
      </div>

      <input type="text"
             [(ngModel)]="question.text"
             [readonly]="is_editing_locked"
             placeholder="What is your question?"
             class="w-full p-4 bg-gray-50 border-transparent focus:bg-white focus:border-black rounded-2xl mb-8 focus:outline-none transition font-bold text-xl tracking-tight" />

      <div class="space-y-4 mb-8">
        <p class="text-xs font-black uppercase tracking-widest text-gray-300">Варианты ответа</p>
        <ul class="space-y-3" cdkDropList (cdkDropListDropped)="dropOption($event, i)">
          <li *ngFor="let option of question.options; let j = index" cdkDrag
              class="flex items-center gap-4 bg-gray-50/50 p-2 rounded-2xl hover:bg-gray-50 transition-colors">

            <input [type]="question.isMultiple ? 'checkbox' : 'radio'"
                   [name]="'correct_' + i"
                   [checked]="option.isCorrect"
                   [disabled]="is_editing_locked"
                   (change)="toggleCorrectOption(question, j)"
                   class="h-6 w-6 ml-2 border-gray-300 text-black focus:ring-black" />

            <input type="text"
                   [(ngModel)]="option.text"
                   [readonly]="is_editing_locked"
                   placeholder="Вариант {{ j + 1 }}"
                   class="flex-1 bg-transparent border-none focus:ring-0 font-medium text-gray-700" />

            <button type="button"
                    [disabled]="is_editing_locked"
                    (click)="removeOption(question, j)"
                    class="p-2 text-gray-300 hover:text-red-500 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
              </svg>
            </button>
          </li>
        </ul>

        <button type="button"
                (click)="addOption(question)"
                class="text-sm font-bold text-gray-400 hover:text-black transition-colors flex items-center gap-2">
          <span class="text-xl">+</span> Add Option
        </button>
      </div>

      <button type="button"
              (click)="removeQuestion(i)"
              class="w-full py-3 border-2 border-dashed border-gray-100 rounded-2xl text-gray-300 font-bold hover:border-red-100 hover:text-red-400 transition-all">
        Remove Question
      </button>
    </div>
  </div>

  <div class="mt-12 flex flex-col items-center gap-6">
    <button type="button"
            (click)="addQuestion()"
            class="w-full py-4 border-2 border-black rounded-2xl font-black text-lg hover:bg-black hover:text-white transition-all active:scale-[0.98]">
      + Add Question
    </button>

    <div *ngIf="test.questions.length >= 1 && test.title != ''"
         class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 bg-black p-8 rounded-[2.5rem] text-white">
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50">Success Rate (%)</label>
        <input type="number" [(ngModel)]="test.minimumSuccessPercent" class="w-full bg-white/10 border-none rounded-xl p-3 focus:ring-2 focus:ring-white/30" />
      </div>
      <div class="space-y-2">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50">Difficulty (0-5)</label>
        <input type="number" [(ngModel)]="test.difficult" class="w-full bg-white/10 border-none rounded-xl p-3 focus:ring-2 focus:ring-white/30" />
      </div>

      <button (click)="btnAdd()" class="md:col-span-2 mt-4 bg-white text-black py-4 rounded-2xl font-black text-xl hover:bg-gray-200 transition-colors">
        Finish & Create
      </button>
    </div>
  </div>

  <div class="mt-20 pt-10 border-t border-gray-100">
    <button (click)="json_add = !json_add" class="text-gray-400 font-bold text-sm hover:text-black">
      {{ json_add ? '− Скрыть импорт' : '+ Импортировать из JSON' }}
    </button>
    <div *ngIf="json_add" class="mt-6 space-y-4">
      <textarea [(ngModel)]="json_input" class="w-full h-48 p-4 bg-gray-50 border-none rounded-2xl font-mono text-xs focus:ring-2 focus:ring-black"></textarea>
      <button (click)="loadFromJson()" class="bg-gray-100 px-6 py-2 rounded-full font-bold text-sm hover:bg-black hover:text-white transition-colors">Load Data</button>
    </div>
  </div>

</div>
