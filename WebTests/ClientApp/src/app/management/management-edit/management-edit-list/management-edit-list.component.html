<div class="max-w-5xl mx-auto px-6 pt-24 pb-20">

  <div class="mb-12">
    <h2 class="text-5xl font-black text-black mb-4 tracking-tighter">Ваши проекты</h2>
    <!--<p class="text-gray-400 font-medium text-lg">Select a project to modify or view its performance.</p>-->
  </div>

  <div *ngIf="tests.length !== 0; else no_tests" class="grid gap-6">
    <div *ngFor="let test of tests" class="group">
      <a [routerLink]="['/management/edit', test.id]"
         class="flex items-center bg-white border border-gray-100 rounded-[2.5rem] p-4 pr-8
                hover:shadow-2xl hover:shadow-gray-200/50 hover:scale-[1.01] transition-all duration-300 shadow-sm">

        <div class="w-24 h-24 rounded-[1.5rem] overflow-hidden bg-gray-100 shrink-0 border border-gray-50">
          <img [src]="test.coverUrl || 'covers/default-test-cover.jpg'"
               class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
               alt="">
        </div>

        <div class="ml-6 flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-1">
            <h3 class="text-xl font-bold text-black truncate">{{ test.title }}</h3>
            <span [class]="test.published ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'"
                  class="text-[9px] font-black uppercase px-2 py-0.5 rounded-md tracking-wider">
              {{ test.published ? 'Опубликован' : 'Черновик' }}
            </span>
          </div>

          <div class="flex items-center gap-4 text-xs font-bold text-gray-300">
            <span class="flex items-center gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              {{ test.questions.length || 0 }} вопросов
            </span>
            <!--<span>•</span>
            <span>Updated {{ test.editDate | date:'dd MMM' }}</span>-->
          </div>
        </div>

        <div class="ml-4 text-gray-200 group-hover:text-black transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </div>
      </a>
    </div>
  </div>

  <ng-template #no_tests>
    <div class="text-center py-20 bg-gray-50 rounded-[3rem] border-2 border-dashed border-gray-100">
      <div class="text-6xl mb-6">empty_file</div>
      <p class="text-2xl font-bold text-black mb-6">Нет тестов</p>
      <a [routerLink]="['/management/create']"
         class="inline-block bg-black text-white px-10 py-4 rounded-2xl font-bold hover:scale-105 transition-transform">
        Создайте свой первый тест
      </a>
    </div>
  </ng-template>

</div>
