<div class="max-w-5xl mx-auto px-6 pt-24">

  <div class="flex items-center justify-center p-6">
    <div class="flex items-center w-full max-w-2xl bg-gray-300 rounded-full p-1 shadow-inner">

      <div class="pl-4 text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>

      <input type="text"
             placeholder="Введите название..."
             [(ngModel)]="searchText"
             (input)="filterTests()"
             class="flex-1 bg-white mx-2 my-1 py-2 px-6 rounded-full text-lg focus:outline-none focus:ring-2 focus:ring-inset focus:ring-gray-400 placeholder-gray-400 transition ease-linear" />

      <button class="bg-gray-600 text-white px-8 py-2 rounded-full text-lg font-medium hover:bg-gray-700 transition-colors ease-linear mr-1">
        найти
      </button>
    </div>
  </div>

  <div class="space-y-4 py-6">
    <div *ngFor="let test of filteredTests"
         class="flex bg-gray-200 border border-gray-400 rounded-[40px] overflow-hidden shadow-sm
            hover:shadow-md hover:scale-[1.01] transition-all duration-200 h-52 block no-underline text-inherit">

      <div class="w-1/3 min-w-[200px] h-full border-r border-gray-400">
        <img [src]="test.coverUrl || 'covers/default-test-cover.jpg'"
             class="w-full h-full object-cover"
             alt="Test cover">
      </div>

      <div class="flex-1 p-6 flex flex-col">
        <div class="flex justify-between items-start">
          <button (click)="checkStart(test)" class="cursor-pointer">
            <h3 class="text-3xl font-bold text-black truncate mr-4">{{ test.title }}</h3>
          </button>

          <div class="flex shrink-0 mt-1">
            <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
              <svg [class]="i < test.difficult ? 'text-gray-500' : 'text-white'"
                   class="w-8 h-8 fill-current stroke-gray-400 stroke-1"
                   viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            </ng-container>
          </div>
        </div>

        <p class="mt-3 text-gray-600 text-lg line-clamp-2 flex-grow">
          {{ test.description || 'Описание теста отсутствует...' }}
        </p>

        <div class="mt-auto flex items-center justify-between">
          <div class="flex items-center text-gray-500 font-medium">
            <span class="mr-2">Автор:</span>
            <span class="text-gray-800">{{ test.creatorId || 'Аноним' }}</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <ng-template #no_tests>
    <h3 class="text-xl text-gray-500">Нет тестов</h3>
  </ng-template>

</div>

<div *ngIf="isModalStartOpen && selectedTest"
     class="fixed inset-0 bg-black bg-opacity-40 flex justify-center items-start pt-20 z-50">

  <div class="bg-white p-6 rounded-xl shadow-xl w-80">

    <p class="mb-4 text-lg text-center">Начать тест "{{ selectedTest.title }}"?</p>

    <a [routerLink]="['/tests', selectedTest.id]"
       class="block w-full px-4 py-2 bg-green-600 text-center text-white rounded-lg hover:bg-green-700 transition">
      Подтвердить
    </a>
    <button (click)="closeModal()"
            class="block w-full px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
      Отмена
    </button>
  </div>
</div>

<div *ngIf="filteredTests.length === 0" class="text-center text-gray-500 text-xl">
  Ничего не найдено
</div>
