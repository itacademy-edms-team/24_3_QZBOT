<div class="max-w-5xl mx-auto px-6 pt-24 pb-20">

  <div class="flex items-center justify-center mb-4">
    <div class="flex items-center w-full max-w-2xl bg-gray-100 rounded-full p-1 shadow-sm border border-gray-50">
      <div class="pl-5 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input type="text"
             placeholder="Название..."
             [(ngModel)]="searchText"
             (input)="filterTests()"
             class="flex-1 bg-transparent mx-2 py-3 px-4 text-lg focus:outline-none placeholder-gray-400 font-medium" />
    </div>
  </div>

  <div class="flex items-center justify-center mb-10">
    <div class="flex items-center gap-2 bg-gray-100 rounded-full p-1 shadow-sm border border-gray-50">

      <!-- Сортировка по названию -->
      <button (click)="sortBy = 'title'; applySorting()"
              [ngClass]="sortBy === 'title'
        ? 'bg-white shadow text-black'
        : 'text-gray-400 hover:text-black'"
              class="px-5 py-2 rounded-full font-bold transition-all">
        Название
      </button>

      <!-- Сортировка по сложности -->
      <button (click)="sortBy = 'difficulty'; applySorting()"
              [ngClass]="sortBy === 'difficulty'
        ? 'bg-white shadow text-black'
        : 'text-gray-400 hover:text-black'"
              class="px-5 py-2 rounded-full font-bold transition-all">
        Сложность
      </button>

      <!-- Разделитель -->
      <div class="w-px h-6 bg-gray-200 mx-1"></div>

      <!-- Направление -->
      <button (click)="sortDirection = sortDirection === 'asc' ? 'desc' : 'asc'; applySorting()"
              class="px-4 py-2 rounded-full text-gray-400 hover:text-black transition-all">

        <!-- Иконка вверх -->
        <svg *ngIf="sortDirection === 'asc'"
             xmlns="http://www.w3.org/2000/svg"
             class="h-5 w-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 15l7-7 7 7" />
        </svg>

        <!-- Иконка вниз -->
        <svg *ngIf="sortDirection === 'desc'"
             xmlns="http://www.w3.org/2000/svg"
             class="h-5 w-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 9l-7 7-7-7" />
        </svg>

      </button>

    </div>
  </div>

  <div *ngIf="filteredTests.length > 0; else no_results" class="space-y-6">
    <div *ngFor="let test of filteredTests"
         class="group flex bg-white border border-gray-100 rounded-[40px] overflow-hidden shadow-sm hover:shadow-2xl hover:shadow-gray-200/50 hover:scale-[1.01] transition-all duration-300 h-60">

      <div class="w-1/3 min-w-[240px] h-full overflow-hidden border-r border-gray-50">
        <img [src]="test.coverUrl || 'covers/default-test-cover.jpg'"
             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
             alt="Test cover">
      </div>

      <div class="flex-1 p-8 flex flex-col">
        <div class="flex justify-between items-start mb-4">
          <a [routerLink]="getTestLink(test)">
            <h3 class="text-2xl font-black text-black truncate max-w-md group-hover/title:text-gray-600 transition-colors">
              {{ test.title }}
            </h3>
          </a>

          <!--<button (click)="checkStart(test)" class="text-left group/title">
            <h3 class="text-2xl font-black text-black truncate max-w-md group-hover/title:text-gray-600 transition-colors">
              {{ test.title }}
            </h3>
          </button>-->

          <div class="flex shrink-0 gap-0.5">
            <ng-container *ngFor="let star of [1,2,3,4,5]; let i = index">
              <svg [class]="i < test.difficult ? 'text-black' : 'text-gray-100'"
                   class="w-6 h-6 fill-current transition-colors"
                   viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
              </svg>
            </ng-container>
          </div>
        </div>

        <p class="text-gray-400 text-lg font-medium line-clamp-2 mb-6">
          {{ test.description }}
        </p>

        <!--<div class="mt-auto flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gray-900 flex items-center justify-center text-[10px] text-white font-black">
              {{ (test.creatorId?.substring(0, 2) | uppercase) || 'AN' }}
            </div>
            <span class="text-sm font-bold text-black">{{ test.creatorId || 'Anonymous' }}</span>
          </div>
        </div>-->
      </div>
    </div>
  </div>

  <ng-template #no_results>
    <div class="text-center py-20">
      <p class="text-2xl font-bold text-gray-300">Не найдено...</p>
    </div>
  </ng-template>

</div>

<div *ngIf="isModalStartOpen && selectedTest"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-[100] p-6">
  <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center animate-in fade-in zoom-in duration-300">
    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h3 class="text-2xl font-black mb-2">Готовы начать?</h3>
    <p class="text-gray-400 font-medium mb-8">"{{ selectedTest.title }}"</p>

    <div class="space-y-3">
      <a [routerLink]="['/tests', selectedTest.id]"
         class="block w-full py-4 bg-black text-white rounded-2xl font-black hover:scale-105 transition-transform">
        Начать
      </a>
      <button (click)="closeModal()"
              class="block w-full py-4 text-gray-400 font-bold hover:text-black transition-colors">
        Позже
      </button>
    </div>
  </div>
</div>
