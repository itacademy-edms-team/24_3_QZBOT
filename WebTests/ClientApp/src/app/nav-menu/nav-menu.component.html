<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
        [ngClass]="{
          'bg-white/90 border-b border-gray-100 shadow-sm': isScrolled,
          'bg-white/60 backdrop-blur-md': !isScrolled
        }">
  <nav>
    <div class="container mx-auto px-6 md:px-10 flex items-center justify-between transition-all duration-500"
         [ngClass]="isScrolled ? 'h-12' : 'h-16'">

      <a class="font-black tracking-tighter text-black transition-all duration-500"
         [ngClass]="isScrolled ? 'text-lg' : 'text-xl'"
         [routerLink]="['/']">
        Testify
      </a>

      <div class="hidden md:flex items-center">
        <ul class="flex space-x-6 text-[14px] font-bold text-gray-800">

          <li class="transition-colors hover:text-black"
              [routerLinkActive]="['text-black', 'border-b-2', 'border-black']"
              [routerLinkActiveOptions]="{ exact: true }">
            <a [routerLink]="['/tests']" class="pb-1">Обзор тестов</a>
          </li>

          <li class="transition-colors hover:text-black"
              *ngIf="authService.isAuthenticated"
              [routerLinkActive]="['text-black', 'border-b-2', 'border-black']">
            <a [routerLink]="['/management']" class="pb-1">Управление</a>
          </li>

          <li class="transition-colors hover:text-black">
            <div *ngIf="authService.isAuthenticated; else loginLink">
              <a [routerLink]="['/profile', currentUserUsername]"
                 [routerLinkActive]="['text-black']">{{ currentUserUsername }}</a>
            </div>
            <ng-template #loginLink>
              <a [routerLink]="['/login']"
                 [routerLinkActive]="['text-black', 'border-b-2', 'border-black']"
                 class="pb-1">Войти</a>
            </ng-template>
          </li>

        </ul>
      </div>

      <button (click)="toggle()" class="md:hidden p-1 text-gray-800">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

    </div>
  </nav>
</header>
